<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Standard Logistics seal">
  <defs>
    <linearGradient id="sealGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3ba4e"/>
      <stop offset="0.55" stop-color="#c9971c"/>
      <stop offset="1" stop-color="#a87b10"/>
    </linearGradient>
  </defs>
  <!-- outer disc -->
  <circle cx="32" cy="32" r="31" fill="url(#sealGold)"/>
  <circle cx="32" cy="32" r="31" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>
  <!-- engraved inner ring -->
  <circle cx="32" cy="32" r="25.5" fill="none" stroke="#7a5a0c" stroke-opacity="0.55" stroke-width="1.4"/>
  <circle cx="32" cy="32" r="22.5" fill="none" stroke="#fff3cf" stroke-opacity="0.5" stroke-width="0.9"/>
  <!-- ring of ticks -->
  <g stroke="#6f5209" stroke-opacity="0.5" stroke-width="1.4" stroke-linecap="round">
    <line x1="32" y1="4.5" x2="32" y2="8"/>
    <line x1="32" y1="56" x2="32" y2="59.5"/>
    <line x1="4.5" y1="32" x2="8" y2="32"/>
    <line x1="56" y1="32" x2="59.5" y2="32"/>
    <line x1="12.6" y1="12.6" x2="15.1" y2="15.1"/>
    <line x1="48.9" y1="48.9" x2="51.4" y2="51.4"/>
    <line x1="12.6" y1="51.4" x2="15.1" y2="48.9"/>
    <line x1="48.9" y1="15.1" x2="51.4" y2="12.6"/>
  </g>
  <!-- central shield -->
  <path d="M32 15 L45 20 V33 C45 42 39 47.5 32 50 C25 47.5 19 42 19 33 V20 Z"
        fill="#0e1a2b" stroke="#fff3cf" stroke-opacity="0.65" stroke-width="1.1"/>
  <!-- star -->
  <path d="M32 24.5 L34.4 31.2 L41.5 31.3 L35.8 35.5 L37.9 42.3 L32 38.2 L26.1 42.3 L28.2 35.5 L22.5 31.3 L29.6 31.2 Z"
        fill="url(#sealGold)"/>
</svg>
