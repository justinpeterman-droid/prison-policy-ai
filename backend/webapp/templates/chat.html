<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reference Search | DocFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#08090a;--panel:#0f1011;--surface:#191a1b;--text:#f7f8f8;--text2:#d0d6e0;--text3:#8a8f98;--text4:#62666d;--accent:#5e6ad2;--accent2:#7170ff;--border:rgba(255,255,255,0.08);--border-sub:rgba(255,255,255,0.05)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-feature-settings:'cv01','ss03'}
  nav{position:sticky;top:0;z-index:50;background:var(--panel);border-bottom:1px solid var(--border-sub);padding:0 24px;display:flex;align-items:center;height:48px;justify-content:space-between}
  nav .brand{font-size:13px;font-weight:510;color:var(--text2);letter-spacing:-0.13px}
  nav .brand span{color:var(--accent2)}
  nav a{font-size:13px;font-weight:510;color:var(--text3);text-decoration:none;transition:color 0.15s}
  nav a:hover{color:var(--text)}
  .container{max-width:760px;margin:0 auto;padding:40px 24px}
  h1{font-size:32px;font-weight:510;letter-spacing:-0.704px;color:var(--text);margin-bottom:6px}
  .sub{font-size:14px;color:var(--text4);margin-bottom:32px;letter-spacing:-0.182px}
  #chat{display:flex;flex-direction:column;gap:16px;margin-bottom:20px;min-height:400px}
  .msg{padding:14px 18px;border-radius:8px;line-height:1.55;font-size:15px;max-width:100%}
  .user{background:rgba(94,106,210,0.12);border:1px solid rgba(94,106,210,0.2);color:var(--text2);align-self:flex-end;border-radius:8px 8px 2px 8px;margin-left:40px}
  .ai{background:var(--surface);border:1px solid var(--border);color:var(--text2);white-space:pre-wrap;align-self:flex-start;border-radius:8px 8px 8px 2px;margin-right:40px}
  .ai .src{display:inline-block;background:rgba(255,255,255,0.05);color:var(--text3);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:510;margin:3px 3px 0 0;border:1px solid var(--border-sub)}
  .input-row{display:flex;gap:8px;position:sticky;bottom:0;background:var(--bg);padding:16px 0;border-top:1px solid var(--border-sub)}
  input{flex:1;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color 0.15s}
  input:focus{border-color:var(--accent2)}
  button{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:510;cursor:pointer;transition:background 0.15s;font-family:inherit}
  button:hover{background:var(--accent2)}
  button:disabled{opacity:0.4}
  @media(max-width:640px){.msg{margin-left:10px!important;margin-right:10px!important}}
</style>
</head>
<body>
<nav>
  <div class="brand"><a href="/" style="color:inherit;text-decoration:none">SLUT</a></div>
  <a href="/reports">Forms →</a>
</nav>
<div class="container">
  <h1>Reference Search</h1>
  <p class="sub">Search administrative policies, directives, and unit procedures.</p>
  <div id="chat"></div>
  <div class="input-row">
    <input id="q" placeholder="What procedure are you looking for?" autofocus onkeypress="if(event.key==='Enter')send()">
    <button id="btn" onclick="send()">Search</button>
  </div>
</div>
<script>
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function send(){
  const i=document.getElementById('q'),b=document.getElementById('btn');
  const q=i.value.trim();if(!q)return;
  document.getElementById('chat').innerHTML+=`<div class="msg user">${esc(q)}</div>`;
  i.value='';b.disabled=true;
  fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})})
  .then(r=>r.json()).then(d=>{
    let srcs='';
    if(d.sources&&d.sources.length)srcs=d.sources.map(s=>`<span class="src">${esc(s.substring(0,60))}</span>`).join('');
    document.getElementById('chat').innerHTML+=`<div class="msg ai">${esc(d.answer||d.error)}<br>${srcs}</div>`;
    document.getElementById('chat').lastChild?.scrollIntoView({behavior:'smooth'});
  }).catch(e=>{
    document.getElementById('chat').innerHTML+=`<div class="msg ai" style="color:#e74c3c">Error: ${esc(e.message)}</div>`;
  }).finally(()=>b.disabled=false);
}
</script>
</body>
</html>
