<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reference Search · SLUT</title>
<link rel="stylesheet" href="/static/fonts.css">
<style>
  :root{
    --bg:#08090a;--panel:rgba(10,11,12,0.78);--surface:#131416;--elevated:#1b1c1f;
    --text:#f7f8f8;--text2:#d0d6e0;--text3:#8a8f98;--text4:#62666d;
    --accent:#5e6ad2;--accent2:#7170ff;--accent-glow:rgba(94,106,210,0.35);
    --border:rgba(255,255,255,0.08);--border-sub:rgba(255,255,255,0.05);
    --danger:#e5534b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-feature-settings:'cv01','ss03';-webkit-font-smoothing:antialiased}
  ::selection{background:rgba(113,112,255,0.28)}
  ::-webkit-scrollbar{width:10px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:5px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.14)}

  nav{position:sticky;top:0;z-index:50;background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border-sub);padding:0 24px;display:flex;align-items:center;height:52px;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:510;color:var(--text2);letter-spacing:-0.13px;text-decoration:none}
  .brand .mark{width:20px;height:20px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;box-shadow:0 0 12px var(--accent-glow)}
  nav .nav-link{font-size:13px;font-weight:510;color:var(--text3);text-decoration:none;padding:6px 12px;border-radius:6px;transition:color .15s,background .15s}
  nav .nav-link:hover{color:var(--text);background:rgba(255,255,255,0.05)}

  .container{max-width:760px;margin:0 auto;padding:40px 24px 0;display:flex;flex-direction:column;min-height:calc(100vh - 52px)}
  h1{font-size:28px;font-weight:510;letter-spacing:-0.021em;color:var(--text);margin-bottom:6px}
  .sub{font-size:14px;color:var(--text4);margin-bottom:28px;letter-spacing:-0.011em}

  #chat{display:flex;flex-direction:column;gap:14px;flex:1;padding-bottom:16px}

  .empty{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 20px;min-height:320px;
  }
  .empty .glyph{
    width:48px;height:48px;border-radius:12px;margin-bottom:16px;
    display:flex;align-items:center;justify-content:center;font-size:22px;
    background:rgba(94,106,210,0.12);border:1px solid rgba(94,106,210,0.22);
  }
  .empty h2{font-size:16px;font-weight:590;color:var(--text2);margin-bottom:6px;letter-spacing:-0.014em}
  .empty p{font-size:13px;color:var(--text4);margin-bottom:22px;max-width:340px;line-height:1.55}
  .chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .chip{
    font-size:12.5px;font-weight:510;color:var(--text3);background:rgba(255,255,255,0.03);
    border:1px solid var(--border);border-radius:9999px;padding:7px 14px;cursor:pointer;
    font-family:inherit;transition:all .15s;
  }
  .chip:hover{color:var(--text);border-color:rgba(113,112,255,0.4);background:rgba(94,106,210,0.08)}

  .msg{padding:13px 17px;border-radius:10px;line-height:1.6;font-size:14.5px;max-width:85%;letter-spacing:-0.006em;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .user{
    background:linear-gradient(135deg,rgba(94,106,210,0.16),rgba(113,112,255,0.10));
    border:1px solid rgba(94,106,210,0.25);color:var(--text);
    align-self:flex-end;border-radius:12px 12px 3px 12px;
  }
  .ai{
    background:var(--surface);border:1px solid var(--border);color:var(--text2);
    white-space:pre-wrap;align-self:flex-start;border-radius:12px 12px 12px 3px;
  }
  .ai.err{border-color:rgba(229,83,75,0.35);color:var(--danger)}
  .srcs{margin-top:10px;padding-top:10px;border-top:1px solid var(--border-sub);white-space:normal}
  .src{
    display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.04);color:var(--text3);
    padding:3px 9px;border-radius:5px;font-size:11px;font-weight:510;margin:2px 4px 0 0;
    border:1px solid var(--border-sub);
  }
  .src::before{content:'§';color:var(--accent2);font-size:10px}

  .typing{display:flex;gap:5px;align-items:center;padding:16px 18px}
  .typing .dot{width:6px;height:6px;border-radius:50%;background:var(--text4);animation:pulse 1.2s infinite ease-in-out}
  .typing .dot:nth-child(2){animation-delay:.15s}
  .typing .dot:nth-child(3){animation-delay:.3s}
  @keyframes pulse{0%,60%,100%{opacity:.25;transform:scale(.85)}30%{opacity:1;transform:scale(1)}}

  .input-row{
    position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 24%);
    padding:20px 0 24px;display:flex;gap:8px;
  }
  .input-shell{
    flex:1;display:flex;gap:6px;align-items:center;
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:5px 5px 5px 16px;transition:border-color .15s,box-shadow .15s;
  }
  .input-shell:focus-within{border-color:rgba(113,112,255,0.5);box-shadow:0 0 0 3px rgba(94,106,210,0.15)}
  input{flex:1;background:transparent;border:none;color:var(--text);font-size:14.5px;font-family:inherit;outline:none;padding:8px 0}
  input::placeholder{color:var(--text4)}
  button.primary{
    padding:9px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
    border:none;border-radius:7px;font-size:13.5px;font-weight:560;cursor:pointer;font-family:inherit;
    transition:opacity .15s,box-shadow .15s;box-shadow:0 1px 8px rgba(94,106,210,0.3);
  }
  button.primary:hover{box-shadow:0 2px 16px rgba(113,112,255,0.45)}
  button.primary:disabled{opacity:.4;cursor:default;box-shadow:none}
  button.secondary{
    padding:9px 16px;background:transparent;color:var(--text4);border:1px solid var(--border);
    border-radius:10px;font-size:13px;font-weight:510;cursor:pointer;font-family:inherit;transition:all .15s;
  }
  button.secondary:hover{color:var(--text2);border-color:rgba(255,255,255,0.16);background:rgba(255,255,255,0.03)}
  @media(max-width:640px){.msg{max-width:95%}}
</style>
</head>
<body>
<nav>
  <a class="brand" href="/"><span class="mark">S</span>SLUT</a>
  <div class="nav-right" style="display:flex;gap:4px">
    <a class="nav-link" href="/reports">Forms →</a>
    <a class="nav-link" href="/logout">Log out</a>
  </div>
</nav>
<div class="container">
  <h1>Reference Search</h1>
  <p class="sub">Search administrative policies, directives, and unit procedures.</p>
  <div id="chat"></div>
  <div class="input-row">
    <div class="input-shell">
      <input id="q" placeholder="What procedure are you looking for?" autofocus autocomplete="off" onkeypress="if(event.key==='Enter')send()">
      <button class="primary" id="btn" onclick="send()">Search</button>
    </div>
    <button class="secondary" onclick="clearChat()">Clear</button>
  </div>
</div>
<script>
const chat=document.getElementById('chat');
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function emptyState(){
  return `<div class="empty" id="empty">
    <div class="glyph">📑</div>
    <h2>Search the reference library</h2>
    <p>Ask about any policy, directive, or unit procedure. Answers cite their source documents.</p>
    <div class="chips">
      <button class="chip" onclick="ask('Use of force reporting requirements')">Use of force reporting</button>
      <button class="chip" onclick="ask('Inmate visitation procedures')">Visitation procedures</button>
      <button class="chip" onclick="ask('Contraband handling and documentation')">Contraband handling</button>
    </div>
  </div>`;
}
function ask(q){document.getElementById('q').value=q;send()}
function clearChat(){
  chat.innerHTML=emptyState();
  document.getElementById('q').value='';
  document.getElementById('q').focus();
}
function send(){
  const i=document.getElementById('q'),b=document.getElementById('btn');
  const q=i.value.trim();if(!q)return;
  document.getElementById('empty')?.remove();
  chat.insertAdjacentHTML('beforeend',`<div class="msg user">${esc(q)}</div>`);
  i.value='';b.disabled=true;
  chat.insertAdjacentHTML('beforeend',`<div class="msg ai typing" id="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`);
  chat.lastElementChild?.scrollIntoView({behavior:'smooth',block:'end'});
  fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})})
  .then(r=>r.json()).then(d=>{
    document.getElementById('typing')?.remove();
    let srcs='';
    if(d.sources&&d.sources.length)srcs=`<div class="srcs">`+d.sources.map(s=>`<span class="src" title="${esc(s)}">${esc(s.substring(0,60))}</span>`).join('')+`</div>`;
    chat.insertAdjacentHTML('beforeend',`<div class="msg ai">${esc(d.answer||d.error)}${srcs}</div>`);
    chat.lastElementChild?.scrollIntoView({behavior:'smooth',block:'end'});
  }).catch(e=>{
    document.getElementById('typing')?.remove();
    chat.insertAdjacentHTML('beforeend',`<div class="msg ai err">Error: ${esc(e.message)}</div>`);
  }).finally(()=>{b.disabled=false;i.focus()});
}
clearChat();
</script>
</body>
</html>
