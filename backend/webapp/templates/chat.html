<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reference Search</title>
<link rel="icon" href="/static/seal.svg">
<link rel="stylesheet" href="/static/fonts.css">
<link rel="stylesheet" href="/static/tokens.css">
<style>
  :root{
    --bg:#f7f5f0;--panel:rgba(250,249,245,0.88);--surface:#ffffff;--elevated:#efece4;
    --navy:#0e1a2b;--navy2:#132441;
    --text:#0f1626;--text2:#252e3d;--text3:#5c6675;--text4:#9096a4;
    --accent:#c9971c;--accent2:#9a7210;--accent-glow:rgba(201,151,28,0.30);
    --border:rgba(16,24,40,0.13);--border-sub:rgba(16,24,40,0.08);
    --danger:#d43c30;--hl:rgba(201,151,28,0.20);--green:#0f9d58;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Open Sans','Inter',system-ui,sans-serif;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
  ::selection{background:rgba(201,151,28,0.25)}
  ::-webkit-scrollbar{width:10px}
  ::-webkit-scrollbar-thumb{background:rgba(16,24,40,0.18);border-radius:5px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:rgba(16,24,40,0.3)}

  nav{flex:0 0 auto;position:sticky;top:0;z-index:50;background:var(--panel);backdrop-filter:blur(14px) saturate(1.3);-webkit-backdrop-filter:blur(14px) saturate(1.3);border-bottom:2px solid rgba(201,151,28,0.55);box-shadow:0 1px 12px -6px rgba(16,24,40,0.15);padding:0 24px;display:flex;align-items:center;height:58px;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:800;color:var(--text);letter-spacing:-0.01em;text-decoration:none}
  .brand .mark{width:30px;height:30px;border-radius:50%;display:block;box-shadow:0 1px 3px rgba(16,24,40,0.3)}
  .nav-right{display:flex;gap:4px}
  nav .nav-link{font-size:13.5px;font-weight:600;color:var(--text3);text-decoration:none;padding:7px 13px;border-radius:8px;transition:color .15s,background .15s}
  nav .nav-link:hover{color:var(--text);background:rgba(201,151,28,0.10)}

  /* Split layout */
  .split{flex:1;min-height:0;display:flex;max-width:1280px;width:100%;margin:0 auto}
  .conv-pane{flex:1 1 58%;min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--border-sub)}
  .cite-pane{flex:1 1 42%;min-width:0;display:flex;flex-direction:column;background:linear-gradient(180deg,#0c1626,var(--navy) 55%,#101f34)}

  .pane-head{flex:0 0 auto;padding:22px 24px 12px}
  .pane-head h1{font-size:23px;font-weight:800;letter-spacing:-0.018em;color:var(--text)}
  .pane-head .sub{font-size:13px;color:var(--text4);margin-top:3px}
  .cite-pane .pane-head h1{color:#fff}
  .cite-pane .pane-head .sub{color:#8f9aab}
  .cite-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .cite-head .count{font-size:12px;color:#8f9aab;font-variant-numeric:tabular-nums}

  #chat{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:8px 24px 12px}

  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
  .empty .glyph{width:48px;height:48px;border-radius:50%;margin-bottom:15px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--accent);background:rgba(201,151,28,0.12);border:1px solid rgba(201,151,28,0.35)}
  .empty h2{font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-0.012em}
  .empty p{font-size:13.5px;color:var(--text3);margin-bottom:20px;max-width:330px;line-height:1.6}
  .chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .chip{font-size:12.5px;font-weight:600;color:var(--text3);background:var(--surface);border:1px solid var(--border);border-radius:9999px;padding:7px 15px;cursor:pointer;font-family:inherit;transition:all .15s;box-shadow:0 1px 2px rgba(16,24,40,0.05)}
  .chip:hover{color:var(--text);border-color:rgba(201,151,28,0.55);background:rgba(201,151,28,0.07)}

  .msg{padding:13px 17px;border-radius:11px;line-height:1.62;font-size:14.5px;max-width:92%;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .user{background:linear-gradient(180deg,#13233c,var(--navy));border:1px solid rgba(16,24,40,0.3);color:#fff;align-self:flex-end;border-radius:12px 12px 3px 12px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 2px 8px -3px rgba(16,24,40,0.35)}
  .ai{background:var(--surface);border:1px solid var(--border-sub);color:var(--text2);white-space:pre-wrap;align-self:flex-start;border-radius:12px 12px 12px 3px;box-shadow:0 1px 2px rgba(16,24,40,0.05),0 8px 22px -14px rgba(16,24,40,0.18)}
  .ai.err{border-color:rgba(212,60,48,0.4);color:var(--danger)}
  .cite-chips{margin-top:10px;padding-top:10px;border-top:1px solid var(--border-sub);display:flex;flex-wrap:wrap;gap:6px}
  .cbtn{display:inline-flex;align-items:center;gap:6px;background:#faf9f6;color:var(--text3);padding:3px 10px 3px 6px;border-radius:6px;font-size:11.5px;font-weight:600;border:1px solid var(--border-sub);cursor:pointer;font-family:inherit;transition:all .15s;max-width:100%}
  .cbtn:hover{color:var(--text);border-color:rgba(201,151,28,0.55);background:rgba(201,151,28,0.08)}
  .cbtn .num{flex:0 0 auto;width:16px;height:16px;border-radius:4px;background:linear-gradient(160deg,#ddb041,var(--accent));color:#1a1200;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800}
  .cbtn .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .typing{display:flex;gap:5px;align-items:center;padding:15px 18px}
  .typing .dot{width:6px;height:6px;border-radius:50%;background:var(--text4);animation:pulse 1.2s infinite ease-in-out}
  .typing .dot:nth-child(2){animation-delay:.15s}
  .typing .dot:nth-child(3){animation-delay:.3s}
  @keyframes pulse{0%,60%,100%{opacity:.25;transform:scale(.85)}30%{opacity:1;transform:scale(1)}}

  .input-row{flex:0 0 auto;display:flex;gap:8px;padding:14px 24px 18px;border-top:1px solid var(--border-sub);background:var(--bg)}
  .input-shell{flex:1;display:flex;gap:6px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:5px 5px 5px 16px;box-shadow:0 1px 2px rgba(16,24,40,0.05);transition:border-color .15s,box-shadow .15s}
  .input-shell:focus-within{border-color:rgba(201,151,28,0.6);box-shadow:0 0 0 3px rgba(201,151,28,0.15),0 2px 10px -4px rgba(201,151,28,0.25)}
  input{flex:1;background:transparent;border:none;color:var(--text);font-size:14.5px;font-family:inherit;outline:none;padding:8px 0}
  input::placeholder{color:var(--text4)}
  button.primary{padding:9px 20px;background:linear-gradient(180deg,#ddb041,var(--accent) 60%,#a87b10);color:#1a1200;border:none;border-radius:8px;font-size:13.5px;font-weight:800;cursor:pointer;font-family:inherit;transition:filter .15s,box-shadow .15s,transform .1s;box-shadow:inset 0 1px 0 rgba(255,255,255,0.35),0 2px 8px rgba(201,151,28,0.3)}
  button.primary:hover{filter:brightness(1.05);box-shadow:inset 0 1px 0 rgba(255,255,255,0.4),0 3px 14px rgba(201,151,28,0.45)}
  button.primary:active{transform:translateY(1px)}
  button.primary:disabled{opacity:.45;cursor:default;box-shadow:none;transform:none}
  button.secondary{padding:9px 14px;background:var(--surface);color:var(--text3);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
  button.secondary:hover{color:var(--text);border-color:rgba(16,24,40,0.25)}

  /* Citation pane (navy terminal) */
  #cites{flex:1;min-height:0;overflow-y:auto;padding:8px 24px 20px;display:flex;flex-direction:column;gap:12px}
  #cites::-webkit-scrollbar-thumb{border-color:var(--navy)}
  .cite-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#8f9aab;padding:40px 24px}
  .cite-empty .glyph{width:44px;height:44px;border-radius:50%;margin-bottom:14px;display:flex;align-items:center;justify-content:center;font-size:19px;background:rgba(201,151,28,0.14);border:1px solid rgba(201,151,28,0.4);color:var(--accent)}
  .cite-empty p{font-size:13px;max-width:280px;line-height:1.6}
  .passage{background:linear-gradient(180deg,#16294a,var(--navy2));border:1px solid rgba(255,255,255,0.10);border-radius:10px;overflow:hidden;animation:rise .25s ease;scroll-margin-top:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.05),0 10px 26px -14px rgba(0,0,0,0.5)}
  .passage.flash{animation:flashbg 1.6s ease}
  @keyframes flashbg{0%,22%{border-color:rgba(221,176,65,0.85);box-shadow:0 0 0 3px var(--hl)}100%{border-color:rgba(255,255,255,0.10);box-shadow:none}}
  .passage .p-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 13px;border-bottom:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03)}
  .passage .p-head .who{display:flex;align-items:center;gap:8px;min-width:0}
  .passage .p-head .num{flex:0 0 auto;width:17px;height:17px;border-radius:4px;background:linear-gradient(160deg,#ddb041,var(--accent));color:#1a1200;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
  .passage .p-head .src{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;font-weight:600;color:#e8ecf3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .passage .p-copy{font-size:11px;color:#ddb041;cursor:pointer;background:none;border:none;font-weight:700;padding:3px 7px;border-radius:5px;font-family:inherit;transition:background .15s;flex:0 0 auto}
  .passage .p-copy:hover{background:rgba(201,151,28,0.18)}
  .passage .p-copy.done{color:#3ddc84}
  .passage .p-body{padding:12px 14px;font-size:13px;line-height:1.7;color:#b9c2d0;white-space:pre-wrap;max-height:360px;overflow-y:auto}
  .cite-for{font-size:11.5px;color:#8f9aab;padding:2px 0 2px}

  /* Mobile: citation pane becomes a slide-over overlay */
  .cite-toggle{display:none}
  @media(max-width:820px){
    .split{flex-direction:column}
    .conv-pane{flex:1;border-right:none}
    .cite-pane{position:fixed;inset:58px 0 0 0;z-index:40;transform:translateX(100%);transition:transform .22s ease;border-left:1px solid rgba(255,255,255,0.1)}
    .cite-pane.open{transform:none}
    .cite-toggle{display:inline-flex;align-items:center;gap:6px}
    .cite-close{display:inline-block}
  }
  @media(min-width:821px){.cite-close{display:none}}
  .cite-close{background:rgba(255,255,255,0.08);color:#e8ecf3;border-color:rgba(255,255,255,0.2)}

  :where(a,button):focus-visible{outline:2px solid rgba(201,151,28,0.7);outline-offset:2px}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.001s!important;transition-duration:.001s!important}
  }
</style>
</head>
<body>
<nav>
  <a class="brand" href="/"><img class="mark" src="/static/seal.svg" alt="" width="30" height="30">Standard Logistics</a>
  <div class="nav-right">
    <a class="nav-link" href="/reports">Forms →</a>
    <a class="nav-link" href="/roster">Unit Roster</a>
    <a class="nav-link" href="/logout">Log out</a>
  </div>
</nav>

<div class="split">
  <!-- Conversation -->
  <section class="conv-pane">
    <div class="pane-head">
      <h1>Reference Search</h1>
      <p class="sub">Search administrative policies, directives, and unit procedures.</p>
    </div>
    <div id="chat"></div>
    <div class="input-row">
      <div class="input-shell">
        <input id="q" placeholder="What procedure are you looking for?" autofocus autocomplete="off" onkeypress="if(event.key==='Enter')send()">
        <button class="primary" id="btn" onclick="send()">Search</button>
      </div>
      <button class="secondary cite-toggle" id="citeToggle" onclick="openCites()">Sources</button>
      <button class="secondary" onclick="clearChat()">Clear</button>
    </div>
  </section>

  <!-- Cited policy -->
  <aside class="cite-pane" id="citePane">
    <div class="pane-head cite-head">
      <div>
        <h1 style="font-size:16px">Cited Policy</h1>
        <p class="sub" id="citeFor">The exact passages behind each answer.</p>
      </div>
      <button class="secondary cite-close" onclick="closeCites()" style="padding:5px 12px">Close</button>
    </div>
    <div id="cites"></div>
  </aside>
</div>

<script>
const chat=document.getElementById('chat');
const citesEl=document.getElementById('cites');
const citeFor=document.getElementById('citeFor');
let convos=[];            // per-answer: {question, citations:[{n,source,text}]}
let activeConv=-1;

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function emptyState(){
  return `<div class="empty" id="empty">
    <div class="glyph"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-6-6H8Z"/><path d="M14 3v6h6M8.5 13h7M8.5 17h7"/></svg></div>
    <h2>Search the reference library</h2>
    <p>Ask about any policy, directive, or unit procedure. The exact source passages appear on the right.</p>
    <div class="chips">
      <button class="chip" onclick="ask('Use of force reporting requirements')">Use of force reporting</button>
      <button class="chip" onclick="ask('Inmate visitation procedures')">Visitation procedures</button>
      <button class="chip" onclick="ask('Contraband handling and documentation')">Contraband handling</button>
    </div>
  </div>`;
}
function citeEmpty(){
  return `<div class="cite-empty" id="citeEmpty">
    <div class="glyph">§</div>
    <p>Citations will appear here. Ask a question, then select a citation under any answer to view the exact policy passage.</p>
  </div>`;
}
function ask(q){document.getElementById('q').value=q;send()}

function clearChat(){
  convos=[];activeConv=-1;
  chat.innerHTML=emptyState();
  citesEl.innerHTML=citeEmpty();
  citeFor.textContent='The exact passages behind each answer.';
  const q=document.getElementById('q');q.value='';q.focus();
}

function send(){
  const i=document.getElementById('q'),b=document.getElementById('btn');
  const q=i.value.trim();if(!q)return;
  document.getElementById('empty')?.remove();
  chat.insertAdjacentHTML('beforeend',`<div class="msg user">${esc(q)}</div>`);
  i.value='';b.disabled=true;
  chat.insertAdjacentHTML('beforeend',`<div class="msg ai typing" id="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`);
  chat.scrollTop=chat.scrollHeight;
  fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})})
  .then(r=>r.json()).then(d=>{
    document.getElementById('typing')?.remove();
    if(d.error){chat.insertAdjacentHTML('beforeend',`<div class="msg ai err">${esc(d.error)}</div>`);return}
    const citations=d.citations||[];
    const idx=convos.push({question:q,citations})-1;
    let chips='';
    if(citations.length){
      chips=`<div class="cite-chips">`+citations.map(c=>{
        const label=c.source||('Excerpt '+c.n);
        return `<button class="cbtn" onclick="showCites(${idx},${c.n})"><span class="num">${c.n}</span><span class="lbl">${esc(label)}</span></button>`;
      }).join('')+`</div>`;
    }
    chat.insertAdjacentHTML('beforeend',`<div class="msg ai">${esc(d.answer)}${chips}</div>`);
    chat.scrollTop=chat.scrollHeight;
    if(citations.length)showCites(idx);   // auto-load newest answer's sources
  }).catch(e=>{
    document.getElementById('typing')?.remove();
    chat.insertAdjacentHTML('beforeend',`<div class="msg ai err">Error: ${esc(e.message)}</div>`);
  }).finally(()=>{b.disabled=false;i.focus()});
}

function showCites(convIdx,focusN){
  const c=convos[convIdx];if(!c)return;
  if(activeConv!==convIdx){
    activeConv=convIdx;
    citeFor.textContent='For: "'+(c.question.length>60?c.question.slice(0,60)+'…':c.question)+'"';
    if(!c.citations.length){
      citesEl.innerHTML=`<div class="cite-empty"><div class="glyph">§</div><p>No source passages were returned for this answer.</p></div>`;
    }else{
      citesEl.innerHTML=c.citations.map(p=>{
        const label=p.source||('Policy excerpt '+p.n);
        return `<div class="passage" id="p-${convIdx}-${p.n}">
          <div class="p-head">
            <div class="who"><span class="num">${p.n}</span><span class="src">${esc(label)}</span></div>
            <button class="p-copy" onclick="copyPassage(${convIdx},${p.n},this)">Copy</button>
          </div>
          <div class="p-body">${esc(p.text)}</div>
        </div>`;
      }).join('');
    }
  }
  if(window.matchMedia('(max-width:820px)').matches)openCites();
  if(focusN){
    const el=document.getElementById(`p-${convIdx}-${focusN}`);
    if(el){el.scrollIntoView({behavior:'smooth',block:'nearest'});el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');}
  }else{
    citesEl.scrollTop=0;
  }
}
function copyPassage(convIdx,n,btn){
  const p=(convos[convIdx]?.citations||[]).find(x=>x.n===n);
  const text=p?p.text:'';
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='Copied ✓';btn.classList.add('done');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('done')},1500);
  }).catch(()=>prompt('Copy manually:',text));
}
function openCites(){document.getElementById('citePane').classList.add('open')}
function closeCites(){document.getElementById('citePane').classList.remove('open')}

clearChat();
</script>
</body>
</html>
