<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access</title>
<link rel="stylesheet" href="/static/fonts.css">
<style>
  :root{
    --bg:#08090a;--surface:#131416;
    --text:#f7f8f8;--text2:#d0d6e0;--text3:#8a8f98;--text4:#62666d;
    --accent:#5e6ad2;--accent2:#7170ff;--accent-glow:rgba(94,106,210,0.35);
    --border:rgba(255,255,255,0.08);--border-sub:rgba(255,255,255,0.05);
    --danger:#e5534b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    font-feature-settings:'cv01','ss03';-webkit-font-smoothing:antialiased;
  }
  ::selection{background:rgba(113,112,255,0.28)}
  body::before{
    content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);
    width:700px;height:420px;pointer-events:none;
    background:radial-gradient(ellipse at center,rgba(94,106,210,0.13) 0%,transparent 70%);
    filter:blur(20px);
  }
  .card{
    position:relative;width:100%;max-width:380px;text-align:center;
    background:linear-gradient(var(--surface),var(--surface)) padding-box,
               linear-gradient(160deg,rgba(255,255,255,0.14),rgba(255,255,255,0.03) 50%) border-box;
    border:1px solid transparent;border-radius:14px;padding:40px 32px 32px;
    box-shadow:0 24px 80px rgba(0,0,0,0.5);
    animation:rise .3s ease;
  }
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .mark{
    width:44px;height:44px;border-radius:12px;margin:0 auto 20px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-size:20px;font-weight:700;color:#fff;
    box-shadow:0 0 24px var(--accent-glow);
  }
  h1{font-size:19px;font-weight:590;letter-spacing:-0.016em;margin-bottom:6px}
  .sub{font-size:13px;color:var(--text4);margin-bottom:26px;line-height:1.5}
  input{
    width:100%;padding:13px 14px;text-align:center;font-size:16px;letter-spacing:5px;
    background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-family:inherit;outline:none;margin-bottom:14px;
    transition:border-color .15s,box-shadow .15s;
  }
  input::placeholder{letter-spacing:0.01em;font-size:13.5px;color:var(--text4)}
  input:focus{border-color:rgba(113,112,255,0.5);box-shadow:0 0 0 3px rgba(94,106,210,0.15)}
  button{
    width:100%;padding:12px 0;background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:560;cursor:pointer;
    font-family:inherit;transition:box-shadow .15s;box-shadow:0 1px 8px rgba(94,106,210,0.3);
  }
  button:hover{box-shadow:0 2px 18px rgba(113,112,255,0.45)}
  .error-msg{
    background:rgba(229,83,75,0.08);border:1px solid rgba(229,83,75,0.3);color:var(--danger);
    padding:9px 12px;border-radius:8px;font-size:12.5px;margin-bottom:14px;
  }
  .foot{margin-top:24px;font-size:11.5px;color:var(--text4)}
</style>
</head>
<body>
<div class="card">
  <div class="mark">S</div>
  <h1>Standard Logistics &amp; Unit Tools</h1>
  <p class="sub">Enter your access code to continue.</p>
  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <input type="text" name="code" placeholder="Access code" autofocus autocomplete="off">
    <button type="submit">Enter</button>
  </form>
  <p class="foot">For authorized personnel only.</p>
</div>
</body>
</html>
