<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access</title>
<link rel="icon" href="/static/seal.svg">
<link rel="stylesheet" href="/static/fonts.css">
<link rel="stylesheet" href="/static/tokens.css">
<style>
  :root{
    --navy:#0e1a2b;
    --text:#0f1626;--text3:#5c6675;--text4:#9096a4;
    --gold:#c9971c;--gold-bright:#ddb041;--gold-deep:#a87b10;
    --danger:#d43c30;
    --border-sub:rgba(16,24,40,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Open Sans','Inter',system-ui,sans-serif;color:var(--text);
    background:linear-gradient(180deg,#0c1626,var(--navy) 55%,#101f34);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:rgba(201,151,28,0.25)}
  body::before{
    content:'';position:fixed;top:-220px;left:50%;transform:translateX(-50%);
    width:900px;height:520px;pointer-events:none;
    background:radial-gradient(ellipse at center,rgba(201,151,28,0.10) 0%,transparent 65%);
    filter:blur(26px);
  }
  .card{
    position:relative;width:100%;max-width:400px;text-align:center;
    background:#fff;border-radius:14px;padding:42px 34px 30px;
    box-shadow:0 1px 2px rgba(0,0,0,0.3),0 30px 90px -12px rgba(0,0,0,0.55);
    border-top:4px solid var(--gold);
    animation:rise .3s ease;
  }
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .mark{
    width:52px;height:52px;border-radius:50%;margin:0 auto 20px;display:block;
    box-shadow:0 2px 6px rgba(16,24,40,0.3);
  }
  h1{font-size:20px;font-weight:800;letter-spacing:-0.014em;margin-bottom:6px}
  .sub{font-size:13.5px;color:var(--text3);margin-bottom:26px;line-height:1.5}
  input{
    width:100%;padding:13px 14px;text-align:center;font-size:16px;letter-spacing:5px;
    background:#faf9f6;border:1px solid rgba(16,24,40,0.16);border-radius:9px;
    color:var(--text);font-family:inherit;outline:none;margin-bottom:14px;
    transition:border-color .15s,box-shadow .15s;
  }
  input::placeholder{letter-spacing:0.01em;font-size:13.5px;color:var(--text4)}
  input:focus{border-color:rgba(201,151,28,0.6);box-shadow:0 0 0 3px rgba(201,151,28,0.15)}
  button{
    width:100%;padding:13px 0;background:linear-gradient(180deg,var(--gold-bright),var(--gold) 60%,var(--gold-deep));
    color:#1a1200;border:none;border-radius:9px;font-size:15px;font-weight:800;cursor:pointer;
    font-family:inherit;transition:filter .15s,box-shadow .15s,transform .1s;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.35),0 2px 10px rgba(201,151,28,0.35);
  }
  button:hover{filter:brightness(1.05);box-shadow:inset 0 1px 0 rgba(255,255,255,0.4),0 4px 18px rgba(201,151,28,0.5)}
  button:active{transform:translateY(1px)}
  .error-msg{
    background:rgba(212,60,48,0.07);border:1px solid rgba(212,60,48,0.3);color:var(--danger);
    padding:9px 12px;border-radius:9px;font-size:12.5px;margin-bottom:14px;font-weight:600;
  }
  .foot{margin-top:24px;font-size:11.5px;color:var(--text4);border-top:1px solid var(--border-sub);padding-top:16px}

  :where(a,button):focus-visible{outline:2px solid rgba(201,151,28,0.7);outline-offset:2px}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.001s!important;transition-duration:.001s!important}
  }
</style>
</head>
<body>
<div class="card">
  <img class="mark" src="/static/seal.svg" alt="" width="52" height="52">
  <h1>Standard Logistics &amp; Unit Tools</h1>
  <p class="sub">Enter your access code to continue.</p>
  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <input type="text" name="code" placeholder="Access code" autofocus autocomplete="off">
    <button type="submit">Enter</button>
  </form>
  <p class="foot">For authorized personnel only.</p>
</div>
</body>
</html>
