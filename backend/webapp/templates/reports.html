<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Preparation · SLUT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08090a;--panel:rgba(10,11,12,0.78);--surface:#131416;--elevated:#1b1c1f;
    --text:#f7f8f8;--text2:#d0d6e0;--text3:#8a8f98;--text4:#62666d;
    --accent:#5e6ad2;--accent2:#7170ff;--accent-glow:rgba(94,106,210,0.35);
    --border:rgba(255,255,255,0.08);--border-sub:rgba(255,255,255,0.05);
    --green:#27a644;--danger:#e5534b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-feature-settings:'cv01','ss03';-webkit-font-smoothing:antialiased}
  ::selection{background:rgba(113,112,255,0.28)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:5px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.14)}

  nav{position:sticky;top:0;z-index:50;background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border-sub);padding:0 24px;display:flex;align-items:center;height:52px;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:510;color:var(--text2);letter-spacing:-0.13px;text-decoration:none}
  .brand .mark{width:20px;height:20px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;box-shadow:0 0 12px var(--accent-glow)}
  nav .nav-link{font-size:13px;font-weight:510;color:var(--text3);text-decoration:none;padding:6px 12px;border-radius:6px;transition:color .15s,background .15s}
  nav .nav-link:hover{color:var(--text);background:rgba(255,255,255,0.05)}

  .layout{display:flex;max-width:1200px;margin:0 auto;min-height:calc(100vh - 52px)}
  .input-panel{width:400px;flex-shrink:0;padding:32px 28px;border-right:1px solid var(--border-sub);overflow-y:auto}
  .preview-panel{flex:1;padding:40px 32px;overflow:auto;display:flex;justify-content:center;align-items:flex-start;background:radial-gradient(ellipse 600px 400px at 50% 0%,rgba(94,106,210,0.05),transparent)}
  @media(max-width:820px){.layout{flex-direction:column}.input-panel{width:100%;border-right:none;border-bottom:1px solid var(--border-sub)}.preview-panel{padding:24px 12px}}

  h2{font-size:20px;font-weight:590;letter-spacing:-0.016em;color:var(--text);margin-bottom:4px}
  .sub{font-size:13px;color:var(--text4);margin-bottom:22px;line-height:1.5}
  .field-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text4);margin-bottom:8px;display:block}

  textarea{
    width:100%;height:180px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:8px;
    padding:13px 15px;color:var(--text2);font-family:inherit;font-size:13px;resize:vertical;outline:none;
    line-height:1.6;transition:border-color .15s,box-shadow .15s;
  }
  textarea::placeholder{color:var(--text4)}
  textarea:focus{border-color:rgba(113,112,255,0.5);box-shadow:0 0 0 3px rgba(94,106,210,0.15)}
  .char-count{font-size:11px;color:var(--text4);text-align:right;margin:6px 2px 14px;font-variant-numeric:tabular-nums}

  .btn-row{display:flex;gap:8px;margin-bottom:16px}
  button.primary{
    flex:1;padding:10px 0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;
    border-radius:7px;font-size:13.5px;font-weight:560;cursor:pointer;font-family:inherit;
    transition:opacity .15s,box-shadow .15s;box-shadow:0 1px 8px rgba(94,106,210,0.3);
  }
  button.primary:hover{box-shadow:0 2px 16px rgba(113,112,255,0.45)}
  button.primary:disabled{opacity:.4;cursor:default;box-shadow:none}
  button.secondary{
    padding:10px 18px;background:transparent;color:var(--text4);border:1px solid var(--border);border-radius:7px;
    font-size:13px;font-weight:510;cursor:pointer;font-family:inherit;transition:all .15s;
  }
  button.secondary:hover{color:var(--text2);border-color:rgba(255,255,255,0.16);background:rgba(255,255,255,0.03)}

  .spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:-2px;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:9999px;font-size:11px;font-weight:560;margin:2px 5px 2px 0;letter-spacing:0.01em}
  .badge-type{background:rgba(94,106,210,0.16);color:var(--accent2);border:1px solid rgba(94,106,210,0.32);text-transform:capitalize}
  .badge-charge{background:rgba(255,255,255,0.04);color:var(--text3);border:1px solid var(--border)}
  #badges:not(:empty){margin-bottom:16px}

  .error{background:rgba(229,83,75,0.08);border:1px solid rgba(229,83,75,0.3);color:var(--danger);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;line-height:1.5}

  .report-box{
    margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;
    overflow:hidden;animation:rise .25s ease;
  }
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .report-box .rb-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;border-bottom:1px solid var(--border-sub);
  }
  .report-box h3{font-size:13px;font-weight:590;color:var(--text2);letter-spacing:-0.01em}
  .report-box pre{
    padding:13px 14px;font-size:12.5px;color:var(--text3);white-space:pre-wrap;line-height:1.6;
    max-height:190px;overflow-y:auto;font-family:inherit;
  }
  .copy-link{
    font-size:11.5px;color:var(--accent2);cursor:pointer;background:none;border:none;font-weight:560;
    padding:4px 8px;border-radius:5px;font-family:inherit;transition:background .15s;
  }
  .copy-link:hover{background:rgba(94,106,210,0.12)}
  .copy-link.done{color:var(--green)}

  /* Paper preview */
  .paper-wrap{transform-origin:top center;transform:scale(.85)}
  @media(max-width:1150px){.paper-wrap{transform:scale(.78)}}
  @media(max-width:960px){.paper-wrap{transform:scale(.7)}}
  @media(max-width:820px){.paper-wrap{transform:scale(.9)}}
  @media(max-width:640px){.paper-wrap{transform:scale(.42);transform-origin:top left}}
  .page{
    width:8.5in;min-height:11in;background:#fdfdfc;color:#16181d;padding:0.8in;
    font-family:'Times New Roman',serif;font-size:12pt;line-height:1.6;
    box-shadow:0 1px 2px rgba(0,0,0,0.5),0 24px 80px rgba(0,0,0,0.55);border-radius:3px;
  }
  .page .header{border-bottom:3px double #16181d;padding-bottom:12pt;margin-bottom:18pt;text-align:center}
  .page .header h3{font-size:12pt;font-weight:bold;text-transform:uppercase;letter-spacing:2pt}
  .page .header .agency{font-size:8.5pt;text-transform:uppercase;letter-spacing:1.5pt;color:#555;margin-bottom:4pt}
  .page .field-row{display:flex;gap:24pt;margin-bottom:9pt;font-size:11pt}
  .page .field{flex:1}
  .page .field label{font-weight:bold;font-size:8.5pt;text-transform:uppercase;letter-spacing:0.5pt;color:#555;display:block;margin-bottom:1pt}
  .page .section-title{font-weight:bold;font-size:9.5pt;text-transform:uppercase;letter-spacing:1pt;color:#555;border-bottom:1px solid #bbb;margin:18pt 0 9pt 0;padding-bottom:3pt}
  .page .narrative{font-size:11pt;line-height:1.75;margin-bottom:12pt;white-space:pre-wrap}
  .page .placeholder{color:#999;text-align:center;margin-top:100pt;font-family:'Inter',sans-serif;font-size:10.5pt;line-height:1.7}
  .sig{margin-top:44pt;display:flex;gap:24pt}
  .sig div{flex:1;border-top:1px solid #16181d;padding-top:5pt;font-size:8.5pt;text-transform:uppercase;letter-spacing:0.5pt;color:#555}
</style>
</head>
<body>
<nav>
  <a class="brand" href="/"><span class="mark">S</span>SLUT</a>
  <a class="nav-link" href="/chat">Reference Search →</a>
</nav>

<div class="layout">
  <div class="input-panel">
    <h2>Document Preparation</h2>
    <p class="sub">Enter field notes to generate required documentation with a live form preview.</p>

    <label class="field-label" for="notes">Field Notes</label>
    <textarea id="notes" oninput="countChars()" placeholder="0600 - D-WING: Head count complete. All present.
0615 - Mess hall: Inmate Johnson complained of chest pain. Escorted to medical office.
0620 - Medical notified. Nurse Alvarez on duty."></textarea>
    <div class="char-count" id="charCount">0 characters</div>

    <div class="btn-row">
      <button class="primary" id="genBtn" onclick="generate()"><span id="spinner" class="spinner" style="display:none"></span>Generate Documents</button>
      <button class="secondary" onclick="clearAll()">Clear</button>
    </div>
    <div id="error"></div>
    <div id="badges"></div>

    <div id="reports"></div>
  </div>

  <div class="preview-panel">
    <div class="paper-wrap">
      <div class="page" id="preview">
        <div class="header"><div class="agency">Arkansas Department of Correction</div><h3>Document Preview</h3></div>
        <p class="placeholder">Generated documents will appear here.<br>Enter field notes and select Generate Documents.</p>
      </div>
    </div>
  </div>
</div>

<script>
let _reportTexts=[];
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmt(val){return val||'—'}
function countChars(){
  const n=document.getElementById('notes').value.length;
  document.getElementById('charCount').textContent=n.toLocaleString()+' character'+(n===1?'':'s');
}
function copyReport(idx,btn){
  const text=_reportTexts[idx]||'';
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='Copied ✓';btn.classList.add('done');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('done')},1600);
  }).catch(()=>prompt('Copy manually:',text));
}

function clearAll(){
  document.getElementById('notes').value='';
  document.getElementById('error').innerHTML='';
  document.getElementById('badges').innerHTML='';
  document.getElementById('reports').innerHTML='';
  _reportTexts=[];
  countChars();
  document.getElementById('preview').innerHTML=`
    <div class="header"><div class="agency">Arkansas Department of Correction</div><h3>Document Preview</h3></div>
    <p class="placeholder">Generated documents will appear here.<br>Enter field notes and select Generate Documents.</p>`;
}

async function generate(){
  const notes=document.getElementById('notes').value.trim();
  if(!notes)return;
  const btn=document.getElementById('genBtn'),sp=document.getElementById('spinner');
  btn.disabled=true;sp.style.display='inline-block';
  document.getElementById('error').innerHTML='';
  document.getElementById('badges').innerHTML='';
  document.getElementById('reports').innerHTML='';
  _reportTexts=[];
  try{
    const r=await fetch('/api/reports',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes})});
    const d=await r.json();
    if(d.error)throw new Error(d.error);

    let badges='';
    if(d.incident_type)badges+=`<span class="badge badge-type">${esc(d.incident_type.replace(/_/g,' '))}</span>`;
    (d.charges||[]).forEach(c=>{badges+=`<span class="badge badge-charge">${esc(c)}</span>`});
    document.getElementById('badges').innerHTML=badges;

    let html='';
    const rp=d.reports||{};
    if(rp.supervisor_summary)html+=reportBox('Supervisor Summary',rp.supervisor_summary);
    if(rp.first_person)html+=reportBox('First Person Report',rp.first_person);
    if(rp.disciplinary)html+=reportBox('Disciplinary Supplement',rp.disciplinary);
    document.getElementById('reports').innerHTML=html;

    updatePreview(d);
  }catch(e){
    document.getElementById('error').innerHTML=`<div class="error">${esc(e.message)}</div>`;
  }finally{btn.disabled=false;sp.style.display='none';}
}
function reportBox(title,text){
  const idx=_reportTexts.push(text)-1;
  return `<div class="report-box">
    <div class="rb-head"><h3>${esc(title)}</h3><button class="copy-link" onclick="copyReport(${idx},this)">Copy</button></div>
    <pre>${esc(text)}</pre>
  </div>`;
}
function updatePreview(d){
  const r=d.reports||{};
  const fp=r.first_person||'';
  const m=d.metadata||{};
  document.getElementById('preview').innerHTML=`
    <div class="header"><div class="agency">Arkansas Department of Correction</div><h3>Incident Report</h3></div>
    <div class="field-row">
      <div class="field"><label>Incident Type</label>${esc((d.incident_type||'N/A').replace(/_/g,' '))}</div>
      <div class="field"><label>Date</label>${esc(fmt(m.date||'N/A'))}</div>
    </div>
    <div class="field-row">
      <div class="field"><label>Officer</label>${esc(fmt(m.officer_last?m.officer_last+', '+m.officer_first:'N/A'))}</div>
      <div class="field"><label>Rank</label>${esc(fmt(m.rank||'N/A'))}</div>
    </div>
    <div class="field-row">
      <div class="field"><label>Facility</label>${esc(fmt(m.facility||'N/A'))}</div>
      <div class="field"><label>Shift</label>${esc(fmt(m.shift||'N/A'))}</div>
    </div>
    <div class="field-row">
      <div class="field"><label>Location</label>${esc(fmt(m.location||'N/A'))}</div>
      <div class="field"><label>Time</label>${esc(fmt(m.time||'N/A'))}</div>
    </div>
    <div class="field-row">
      <div class="field"><label>Inmates Involved</label>${esc(fmt(m.inmates_involved||'N/A'))}</div>
    </div>
    <div class="section-title">Narrative</div>
    <div class="narrative">${esc(fp||'No narrative generated.')}</div>
    <div class="sig"><div>${esc(m.officer_first&&m.officer_last?m.officer_first+' '+m.officer_last:'Reporting Officer')}</div><div>Supervisor Review</div><div>${esc(fmt(m.date||'Date'))}</div></div>
  `;
}
countChars();
</script>
</body>
</html>
