<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Writer</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="reports-layout">
  <div class="nav">
    <a href="/">← Home</a>
    <span class="brand">| Report Writing Assistant</span>
  </div>

  <div style="margin: 16px 0 20px">
    <h1 style="color:#fff;font-size:1.5rem;margin-bottom:4px">📝 Generate Reports</h1>
    <p style="color:var(--text-dim);font-size:.9rem">Paste field notes. Auto-classifies, generates reports, fills forms.</p>
  </div>

  <textarea id="notes" placeholder="Enter your field notes — chronological, include all relevant observations...
Example:
0600 — D-WING: Head count complete. All present.
0615 — Mess hall: Inmate #123456 complained of chest pain. Escorted to medical.
0620 — Medical notified. Nurse Alvarez on duty. Vitals taken.
0645 — Inmate cleared by medical, returned to wing. No further complaints."></textarea>
  <div class="char-count"><span id="charCount">0</span> characters</div>

  <div class="btn-row">
    <button class="btn" id="genBtn" onclick="generate()">⚡ Generate Reports</button>
    <div class="spinner"></div>
  </div>

  <div id="results"></div>
  <div id="downloadArea" class="download-area" style="display:none">
    <h4>📎 Download 005/409 Form</h4>
    <p>AI-generated narrative filled into the official incident report template.</p>
    <button class="btn" id="downloadBtn" onclick="downloadForm()">⬇ Download DOC</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// Character counter
$('notes').addEventListener('input', () => {
  $('charCount').textContent = $('notes').value.length.toLocaleString();
});

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch {
    return false;
  }
}

function showCopyFeedback(btn) {
  const orig = btn.textContent;
  btn.textContent = '✓ Copied!';
  btn.style.color = 'var(--success)';
  btn.style.borderColor = 'var(--success)';
  setTimeout(() => {
    btn.textContent = orig;
    btn.style.color = '';
    btn.style.borderColor = '';
  }, 2000);
}

async function generate() {
  const notes = $('notes').value.trim();
  if (!notes) return;

  const btn = $('genBtn');
  const row = document.querySelector('.btn-row');
  btn.disabled = true;
  row.classList.add('loading');
  $('results').innerHTML = '';
  $('downloadArea').style.display = 'none';

  try {
    const r = await fetch('/api/reports', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ notes })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    renderResults(d);
  } catch (e) {
    $('results').innerHTML =
      `<div class="status-banner error">⚠ ${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    row.classList.remove('loading');
  }
}

function renderResults(d) {
  // Classification badges
  let html = '<div class="badges">';
  html += `<span class="badge badge-type">${esc(d.incident_type || 'General Incident')}</span>`;
  (d.forms_required || []).forEach(f =>
    html += `<span class="badge badge-form">📄 ${esc(f)}</span>`
  );
  (d.charges || []).forEach(c =>
    html += `<span class="badge badge-charge">⚖ ${esc(c)}</span>`
  );
  html += '</div>';

  const reports = d.reports || {};
  const tabs = [];
  if (reports.supervisor_summary) tabs.push(['supervisor', '📋 Supervisor Summary']);
  if (reports.first_person) tabs.push(['first', '👤 First Person Report']);
  if (reports.disciplinary) tabs.push(['disciplinary', '⚖ Disciplinary Supplement']);

  if (tabs.length === 0) {
    html += '<div class="status-banner info">No reports generated. Check field notes content.</div>';
    $('results').innerHTML = html;
    return;
  }

  // Tab buttons
  html += '<div class="tabs">';
  tabs.forEach(([id, label], i) => {
    html += `<button class="tab-btn${i === 0 ? ' active' : ''}" onclick="switchTab('${id}')">${label}</button>`;
  });
  html += '</div>';

  // Tab panels
  const reportMap = {
    supervisor: reports.supervisor_summary,
    first: reports.first_person,
    disciplinary: reports.disciplinary
  };
  tabs.forEach(([id], i) => {
    html +=
      `<div class="tab-panel${i === 0 ? ' active' : ''}" id="panel-${id}">
        <div class="report-card">
          <div class="report-body">${esc(reportMap[id])}</div>
          <div class="report-actions">
            <button class="btn-outline" onclick="doCopy(this, '${id}')">📋 Copy</button>
          </div>
        </div>
      </div>`;
  });

  // Store reports for copy
  window._reports = reportMap;

  $('results').innerHTML = html;
  $('downloadArea').style.display = 'block';
}

function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const tabs = ['supervisor', 'first', 'disciplinary'];
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    if (tabs[i] === id) b.classList.add('active');
  });
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('active');
  // Match button to tab
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    const tabs = ['supervisor', 'first', 'disciplinary'];
    if (tabs[i] === id) b.classList.add('active');
  });
}

function doCopy(btn, reportId) {
  const text = window._reports[reportId];
  if (!text) return;
  copyToClipboard(text).then(ok => {
    if (ok) showCopyFeedback(btn);
    else prompt('Copy manually:', text);
  });
}

function downloadForm() {
  const notes = $('notes').value.trim();
  if (!notes) return;
  // POST to download endpoint
  fetch('/api/reports/download', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ notes })
  }).then(r => {
    if (!r.ok) throw new Error('Download failed');
    return r.blob();
  }).then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Incident_Report_Form.docx';
    a.click();
    URL.revokeObjectURL(url);
  }).catch(e => {
    alert('Download not yet available: ' + e.message);
  });
}
</script>
</body>
</html>
