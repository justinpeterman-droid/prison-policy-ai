<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cover Letter — ADC Incident Package</title>
<style>
  :root {--bg:#fff;--text:#111;--line:#333;--muted:#666;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Times New Roman',serif;max-width:8.5in;margin:0 auto;padding:1in;color:var(--text);}
  h1{text-align:center;font-size:14pt;font-weight:bold;margin-bottom:6pt;}
  .sub{text-align:center;font-size:11pt;margin-bottom:24pt;}
  .field{margin-bottom:12pt;display:flex;align-items:baseline;}
  .field label{font-weight:bold;font-size:11pt;width:140px;flex-shrink:0;}
  .field .val{border-bottom:1px solid var(--line);flex:1;min-height:18pt;font-size:11pt;padding:0 4px;}
  .field .val[contenteditable]:empty::before{content:attr(placeholder);color:#999;}
  .section{margin-top:20pt;}
  .section h2{font-size:11pt;border-bottom:1px solid var(--line);margin-bottom:8pt;padding-bottom:2pt;}
  textarea{width:100%;min-height:80pt;border:1px solid var(--line);padding:8pt;font-family:inherit;font-size:11pt;resize:vertical;}
  .sig{margin-top:36pt;display:flex;justify-content:space-between;}
  .sig .line{flex:1;border-top:1px solid var(--line);margin:0 16pt;padding-top:4pt;text-align:center;}
  @media print{
    body{padding:0.5in;}
    button{display:none;}
  }
  button{display:block;margin:20px auto;padding:10px 30px;font-size:12pt;cursor:pointer;}
</style>
</head>
<body>
<h1>ARKANSAS DEPARTMENT OF CORRECTION</h1>
<div class="sub">Incident Package — Cover Letter</div>

<div class="field"><label>TO:</label><div class="val" contenteditable placeholder="Assistant Director / Warden"></div></div>
<div class="field"><label>FROM:</label><div class="val" contenteditable placeholder="Reporting Officer Name / Rank"></div></div>
<div class="field"><label>DATE:</label><div class="val" contenteditable placeholder="Click to enter date"></div></div>
<div class="field"><label>SUBJECT:</label><div class="val" contenteditable placeholder="Re: Incident Report — [Incident Type]"></div></div>
<div class="field"><label>INCIDENT #:</label><div class="val" contenteditable placeholder="NCU-YYYY-MM-NNN"></div></div>

<div class="section">
  <h2>INCIDENT PACKAGE CONTENTS</h2>
  <textarea placeholder="List all enclosed forms:&#10;☐ 005/409 Incident Report&#10;☐ Major Disciplinary Form&#10;☐ Chain of Custody&#10;☐ Confiscation Form&#10;☐ Photograph/Video Documentation&#10;☐ Medical Report&#10;☐ Field Test Results"></textarea>
</div>

<div class="section">
  <h2>BRIEF SUMMARY</h2>
  <textarea placeholder="Provide a brief 2-3 sentence summary of the incident and the enclosed documentation."></textarea>
</div>

<div class="section">
  <h2>ADDITIONAL NOTES</h2>
  <textarea placeholder="Any additional information, follow-up required, or special handling instructions."></textarea>
</div>

<div class="sig">
  <div class="line">Reporting Officer Signature</div>
  <div class="line">Date</div>
  <div class="line">Supervisor Signature</div>
</div>

<button onclick="window.print()">Print / Save as PDF</button>
</body>
</html>
